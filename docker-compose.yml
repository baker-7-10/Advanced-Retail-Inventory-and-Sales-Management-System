services:
  db:
    image: mysql:8.0
    container_name: retail_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-retail_db}
      MYSQL_USER: ${DB_USERNAME:-retail_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-retail_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - retail-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: retail_migrate
    restart: "no"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run migration:run:prod && npm run seed:prod"
    networks:
      - retail-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: retail_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: db
      FRONTEND_URL: http://localhost:4200
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: node dist/main
    networks:
      - retail-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: retail_frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/angular.json:/app/angular.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
    depends_on:
      backend:
        condition: service_started
    networks:
      - retail-network

volumes:
  mysql_data:

networks:
  retail-network:
    driver: bridge